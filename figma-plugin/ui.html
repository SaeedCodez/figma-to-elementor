<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1e1e1e;
    --muted: #7a7a7a;
    --border: #e6e6e6;
    --accent: #0d99ff;
    --accent-fg: #ffffff;
    --field-bg: #f7f7f8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    color: var(--fg);
    background: var(--bg);
  }
  h1 {
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  p.intro {
    margin: 0 0 12px;
    color: var(--muted);
    line-height: 1.45;
  }
  textarea {
    width: 100%;
    height: 380px;
    resize: none;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--field-bg);
    color: var(--fg);
    font-family: "SFMono-Regular", ui-monospace, "Menlo", "Consolas", monospace;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre;
    overflow: auto;
  }
  textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  button {
    appearance: none;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  button.primary { background: var(--accent); color: var(--accent-fg); }
  button.primary:hover { filter: brightness(0.95); }
  button.ghost { background: transparent; color: var(--fg); border-color: var(--border); }
  button.ghost:hover { background: var(--field-bg); }
  #status {
    margin: 0;
    flex: 1;
    color: var(--muted);
    line-height: 1.4;
  }
  #status.ok { color: #14ae5c; }
  #status.err { color: #e5484d; }
</style>
</head>
<body>
  <h1>Figma → Elementor Token Export</h1>
  <p class="intro">Colors and typography from this file's local variables. Copy the JSON below and paste it into the “Figma Token Import” page in WordPress.</p>

  <textarea id="json" readonly spellcheck="false" aria-label="Exported JSON"></textarea>

  <div class="row">
    <button id="copy" class="primary" type="button">Copy JSON</button>
    <button id="close" class="ghost" type="button">Close</button>
    <span id="status">Reading variables…</span>
  </div>

<script>
  var textarea = document.getElementById('json');
  var copyBtn = document.getElementById('copy');
  var closeBtn = document.getElementById('close');
  var statusEl = document.getElementById('status');

  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.className = kind || '';
  }

  // Copy: modern clipboard API best-effort first, then the execCommand
  // fallback which is reliable inside Figma's UI iframe.
  function execCopy() {
    textarea.focus();
    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    setStatus(ok ? 'Copied ✓' : 'Press ⌘/Ctrl + C to copy the selected text.', ok ? 'ok' : 'err');
  }

  copyBtn.addEventListener('click', function () {
    if (!textarea.value) { setStatus('Nothing to copy yet.', 'err'); return; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(textarea.value).then(
        function () { setStatus('Copied ✓', 'ok'); },
        function () { execCopy(); }
      );
    } else {
      execCopy();
    }
  });

  closeBtn.addEventListener('click', function () {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });

  onmessage = function (event) {
    var msg = event.data && event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'payload') {
      var p = msg.payload;
      textarea.value = JSON.stringify(p, null, 2);
      var customCount = (p.customColors || []).length;
      var sysCount = Object.keys(p.systemColors || {}).length;
      var typo = p.typography || {};
      setStatus(
        'Extracted ' + sysCount + ' system colors and ' + customCount +
        ' custom colors. Body: “' + (typo.bodyFamily || '—') +
        '”, Title: “' + (typo.titleFamily || '—') + '”.',
        'ok'
      );
    } else if (msg.type === 'error') {
      textarea.value = '';
      setStatus('Error: ' + msg.message, 'err');
    }
  };
</script>
</body>
</html>
